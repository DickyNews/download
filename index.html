    <style>
        :root {
            --bg: #050505;
            --card: #121214;
            --yellow: #ffcc00;
            --yellow-glow: rgba(255, 204, 0, 0.4);
            --text: #e2e8f0;
            --accent: #1e1e22;
            --cursor-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom Cursor */
        #cursor {
            width: 20px; height: 20px;
            background: var(--cursor-color);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 204, 0, 0.12) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .wrapper {
            max-width: 850px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 {
            font-size: clamp(32px, 7vw, 56px);
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-tag {
            font-size: 13px; font-weight: 700; color: var(--yellow);
            letter-spacing: 4px; text-transform: uppercase; display: block;
            margin-top: 10px; opacity: 0.8;
        }

        .counter-container { display: flex; justify-content: center; margin-bottom: 60px; }
        .modern-badge {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px);
            padding: 10px 25px; border-radius: 100px; border: 1px solid rgba(255, 204, 0, 0.2);
            display: flex; align-items: center; gap: 12px;
        }

        .count-label { font-size: 14px; font-weight: 800; color: var(--yellow); }
        .count-value { font-family: 'Monaco', monospace; font-size: 16px; color: #fff; }

        .download-list { display: grid; gap: 20px; }
        .download-box {
            background: var(--card); padding: 22px 28px; border-radius: 20px;
            border: 1px solid #222; display: flex; justify-content: space-between;
            align-items: center; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .download-box:hover { border-color: var(--yellow); background: #161618; }
        .download-box span { font-weight: 600; font-size: 18px; }

        .btn-download {
            background: var(--yellow); color: #000; padding: 12px 24px;
            border-radius: 12px; text-decoration: none; font-weight: 800;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid #222;
            padding: 25px; border-radius: 20px; margin: 40px 0;
        }

        .section-title {
            color: var(--yellow); font-weight: 800; font-size: 20px;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }

        .social-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 25px; }
        .social-icon {
            width: 55px; height: 55px; background: var(--accent); color: white;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; text-decoration: none; font-size: 22px;
            border: 1px solid #333; transition: 0.4s;
        }
        .social-icon:hover { background: var(--yellow); color: #000; transform: translateY(-5px); }

        footer { margin-top: 80px; padding: 40px 20px; font-size: 12px; color: #666; text-align: center; border-top: 1px solid #111; }

        @media (max-width: 600px) {
            .download-box { flex-direction: column; text-align: center; gap: 15px; }
            .btn-download { width: 100%; justify-content: center; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div class="bg-glow"></div>

<div class="wrapper">
    <header data-aos="fade-down">
        <h1>Dicky News Official</h1>
        <span class="sub-tag">400K SUBSCRIBERS ENTHUSIAST</span>
    </header>

    <div class="counter-container" data-aos="zoom-in">
        <div class="modern-badge">
            <span class="count-label">TOTAL VISITORS</span>
            <span class="count-value" id="count">0</span>
        </div>
    </div>

    <div class="download-list">
        <div class="download-box" data-aos="fade-right">
            <span>GB WA Pro Terbaru V25.95</span>
            <a id="link-gb" href="#" target="_blank" class="btn-download"><i class="fas fa-download"></i> DOWNLOAD</a>
        </div>
        <div class="download-box" data-aos="fade-left">

            <a id="link-mb" href="#" target="_blank" class="btn-download"><i class="fas fa-download"></i> DOWNLOAD</a>
        </div>

        <p><i class="fas fa-archive" style="color: var(--yellow)"></i> Ekstrak File menggunakan Zarchiver.</p>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('link-gb').href = LINK_SETTINGS.gb_WA_pro;
        document.getElementById('link-mb').href = LINK_SETTINGS.mb_WA;
        document.getElementById('link-rc').href = LINK_SETTINGS.rc_WA;
        
        AOS.init({ duration: 800, once: true });

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            document.documentElement.style.setProperty('--mouse-x', (e.clientX / window.innerWidth * 100) + '%');
            document.documentElement.style.setProperty('--mouse-y', (e.clientY / window.innerHeight * 100) + '%');
        });

        // Visitor Counter Simple
        let baseCount = 2654844;
        document.getElementById('count').innerText = baseCount.toLocaleString('id-ID');
    });
</script>
